name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build & Lint ────────────────────────────────────────────────
  build-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          rustflags: ""

      - name: Build
        run: cargo build --verbose

      - name: Lint
        run: |
          cargo fmt -- --check
          cargo clippy --all-targets --all-features

      # Keep Cargo.toml and CITATION.cff versions in lockstep — they are
      # both load-bearing at tag time (the release workflow refuses to tag
      # if they disagree). Catching the mismatch here surfaces it on the
      # PR that bumps the version, not after the tag has already been cut.
      - name: Verify Cargo.toml and CITATION.cff versions agree
        run: |
          cargo_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          citation_version=$(awk '/^version:/ {print $2; exit}' CITATION.cff)
          if [ "$cargo_version" != "$citation_version" ]; then
            echo "::error::Cargo.toml version ${cargo_version} does not match CITATION.cff version ${citation_version}"
            exit 1
          fi

      # Verify the crate packages cleanly for crates.io — exercises the
      # same tarball-then-build path the release workflow's `cargo publish`
      # uses, but without uploading. Catches packaging errors (missing
      # files in `include = `, broken manifest, unpublishable path deps)
      # on the PR that introduces them rather than at tag time when the
      # cost of a bad tag is much higher.
      - name: Package check (cargo publish --dry-run)
        run: cargo publish --dry-run

  # ── Test ────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.profile }})
    needs: build-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: debug
            test_flags: ""
          - profile: release
            test_flags: "--release"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Unit tests
        run: cargo test --verbose ${{ matrix.test_flags }}

  # ── Benchmark: Criterion with baseline comparison ───────────────
  benchmark:
    name: Benchmark
    needs: build-lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Run benchmarks
        run: cargo bench --bench 'benchmark_*' -- --output-format bencher 2>&1 | tee benchmark-output.txt
        env:
          CARGO_TERM_COLOR: never

      # Requires a gh-pages branch to exist for baseline storage.
      # One-time setup: git checkout --orphan gh-pages && git reset --hard && git commit --allow-empty -m "init" && git push origin gh-pages
      - name: Compare benchmarks
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Nolan Benchmarks
          tool: 'cargo'
          output-file-path: benchmark-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # On main: push baseline to gh-pages branch
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          # On PRs: post comparison comment
          comment-on-alert: true
          summary-always: true
          comment-always: true
          # Only flag extreme regressions (>200%) in comments
          alert-threshold: '200%'
          # Do not fail the build on regressions
          fail-on-alert: false
