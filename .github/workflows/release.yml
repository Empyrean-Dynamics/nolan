name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Verify tag matches Cargo.toml and CITATION.cff versions
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          cargo_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          citation_version=$(awk '/^version:/ {print $2; exit}' CITATION.cff)
          if [ "$tag" != "$cargo_version" ]; then
            echo "::error::Tag v${tag} does not match Cargo.toml version ${cargo_version}"
            exit 1
          fi
          if [ "$tag" != "$citation_version" ]; then
            echo "::error::Tag v${tag} does not match CITATION.cff version ${citation_version}"
            exit 1
          fi

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release

      # Publish to crates.io as `hyperjet`. `cargo publish` does its own
      # from-scratch tarball-then-build verification, so packaging errors
      # (missing files in `include = `, broken manifest, etc.) fail before
      # uploading. Idempotent — a duplicate version is rejected by crates.io,
      # so re-running this workflow after a transient failure is safe.
      # Uses the org-scoped `CARGO_REGISTRY_TOKEN` secret (shared with the
      # empyrean workspace's release pipeline).
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      # ── Cross-repo: trigger validation suite ─────────────────────
      # Tag pushes are the moment this repo commits to "this is the
      # version downstream consumers (empyrean-core's pin, then the
      # four distribution channels) will adopt." Fire the validation
      # workflow in empyrean-validation so the new tag is exercised
      # against the cross-channel suite before downstream bumps the
      # pin.
      #
      # Pre-tag main pushes do NOT dispatch — see the validation
      # workflow's "Cross-repo dispatch" doc block.
      #
      # Requires `VALIDATION_DISPATCH_TOKEN` — a fine-grained PAT
      # scoped to the empyrean-validation repo only with
      # `actions: write`.
      - name: Dispatch sibling-tag-push to empyrean-validation
        env:
          GH_TOKEN: ${{ secrets.VALIDATION_DISPATCH_TOKEN }}
        run: |
          gh api repos/Empyrean-Dynamics/empyrean-validation/dispatches \
            -f event_type=sibling-tag-push \
            -f "client_payload[source]=${{ github.repository }}" \
            -f "client_payload[tag]=${{ github.ref_name }}"
